<!DOCTYPE html>
<html>
<head>
  <title>Profile & Settings</title>
  <link rel="stylesheet" href="profile.css">
</head>
<body>

  <h1>Profile & Settings</h1>

  <div class="profile-card">
    <div class="field">
      <label>Full Name</label>
      <input type="text" id="fullName" disabled>
    </div>

    <div class="field">
      <label>Email</label>
      <input type="email" id="email" disabled>
    </div>

    <div class="field">
      <label>Institution</label>
      <input type="text" id="institution" disabled>
    </div>

    <div class="field">
      <label>Expertise</label>
      <input type="text" id="expertise" disabled>
    </div>

    <div class="field">
      <label>City</label>
      <input type="text" id="city" disabled>
    </div>

    <div class="field">
      <label>Role</label>
      <input type="text" id="role" disabled>
    </div>

    <div class="actions">
      <button onclick="enableEdit()">Edit Profile</button>
      <button onclick="saveProfile()">Save</button>
      <button onclick="downloadMyData()">Download My Data</button>
      <button onclick="deleteMyAccount()">Delete My Account</button>
    </div>
  </div>

  <script src="mock-data.js"></script>
  <script src="profile.js"></script>
</body>
</html>
