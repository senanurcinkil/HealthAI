services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    volumes:
      - db_data:/app/data
    environment:
      - SECRET_KEY=change-this-in-production
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data:
