<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard – HealthAI</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f0f4f8;
    }

    /* NAVBAR */
    nav {
      background: white;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #ddd;
    }

    .logo {
      font-weight: bold;
      font-size: 20px;
      color: #2563eb;
    }

    .nav-links a {
      margin-left: 20px;
      text-decoration: none;
      color: #2563eb;
      font-weight: bold;
    }

    /* MAIN */
    .container {
      padding: 2rem;
    }

    h2 {
      margin-bottom: 10px;
    }

    .cards {
      display: flex;
      gap: 20px;
      margin-top: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      flex: 1;
      text-align: center;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .card h3 {
      margin-bottom: 10px;
      color: #64748b;
    }

    .card p {
      font-size: 24px;
      font-weight: bold;
      color: #2563eb;
    }

    /* QUICK LINKS */
    .quick-links {
      margin-top: 30px;
    }

    .quick-links a {
      display: inline-block;
      margin-right: 15px;
      padding: 10px 15px;
      background: #2563eb;
      color: white;
      border-radius: 8px;
      text-decoration: none;
    }
  </style>
</head>

<body>

<!-- NAVBAR -->
<nav>
  <div class="logo">HealthAI</div>

  <div class="nav-links">
    <a href="post-feed.html">Feed</a>
    <a href="create-post.html">Post Oluştur</a>
    <a href="#">Profil</a>
    <a href="admin-panel.html" id="adminLink" style="display:none;">Admin</a>
    <a href="#" id="logout">Çıkış</a>
  </div>
</nav>

<!-- MAIN -->
<div class="container">

  <h2 id="welcome">Hoş geldin</h2>
  <p>HealthAI Co-Creation Platform Dashboard</p>

  <!-- CARDS -->
  <div class="cards">

    <div class="card">
      <h3>Toplam Post</h3>
      <p id="postCount">0</p>
    </div>

    <div class="card">
      <h3>Aktif Meeting</h3>
      <p id="meetingCount">0</p>
    </div>

    <div class="card">
      <h3>Bildirim</h3>
      <p id="notificationCount">0</p>
    </div>

  </div>

  <!-- QUICK LINKS -->
  <div class="quick-links">
    <a href="post-feed.html">Postları Gör</a>
    <a href="create-post.html">Yeni Post</a>
  </div>

</div>

<!-- DATA -->
<script src="mock-data.js"></script>

<script>

  // 🔥 USER CHECK
  const userData = sessionStorage.getItem("healthai_user");

  if (!userData) {
    window.location.href = "login.html";
  }

  const user = JSON.parse(userData);

  // 👋 WELCOME
  document.getElementById("welcome").textContent =
    "Hoş geldin " + user.name;

  // 📊 TOTAL POSTS
  document.getElementById("postCount").textContent = MOCK_POSTS.length;

  // 📊 MOCK DATA
  document.getElementById("meetingCount").textContent = 3;
  document.getElementById("notificationCount").textContent = 5;

  // 🔥 ADMIN CONTROL
  if (user.role === "admin") {
    document.getElementById("adminLink").style.display = "inline";
  }

  // 🚪 LOGOUT
  document.getElementById("logout").addEventListener("click", () => {
    sessionStorage.clear();
    window.location.href = "login.html";
  });

</script>

</body>
</html>
