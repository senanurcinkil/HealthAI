<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse Posts – HealthAI Co-Creation</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f4f8; color: #1e293b; }

    nav {
      background: #fff; border-bottom: 1px solid #e2e8f0; padding: 0 2rem;
      display: flex; align-items: center; justify-content: space-between; height: 60px;
      position: sticky; top: 0; z-index: 100;
    }
    .nav-logo { font-weight: 700; font-size: 1.2rem; color: #1d4ed8; text-decoration: none; }
    .nav-links { display: flex; gap: 1.5rem; list-style: none; }
    .nav-links a { color: #475569; text-decoration: none; font-size: 0.9rem; }
    .nav-links a:hover, .nav-links a.active { color: #1d4ed8; font-weight: 600; }

    .page-wrapper { max-width: 1100px; margin: 2rem auto; padding: 0 1rem; }

    /* FILTER BAR */
    .filter-bar {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1.5rem;
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      align-items: flex-end;
    }
    .filter-group { display: flex; flex-direction: column; gap: 0.3rem; min-width: 150px; flex: 1; }
    .filter-group label { font-size: 0.78rem; font-weight: 600; color: #374151; text-transform: uppercase; letter-spacing: 0.5px; }
    .filter-group select,
    .filter-group input {
      padding: 0.5rem 0.75rem;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.88rem;
      color: #1e293b;
      background: #fff;
    }
    .filter-group select:focus, .filter-group input:focus {
      outline: none; border-color: #3b82f6;
    }
    .btn-filter {
      padding: 0.5rem 1.25rem;
      background: #2563eb; color: #fff;
      border: none; border-radius: 8px;
      font-size: 0.88rem; font-weight: 600;
      cursor: pointer; align-self: flex-end;
      white-space: nowrap;
    }
    .btn-filter:hover { background: #1d4ed8; }
    .btn-reset {
      padding: 0.5rem 1rem;
      background: #f1f5f9; color: #475569;
      border: 1px solid #e2e8f0; border-radius: 8px;
      font-size: 0.88rem; cursor: pointer;
      align-self: flex-end;
    }
    .btn-reset:hover { background: #e2e8f0; }

    /* RESULTS HEADER */
    .results-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 1rem;
    }
    .results-count { font-size: 0.9rem; color: #64748b; }
    .btn-create {
      padding: 0.55rem 1.25rem;
      background: #16a34a; color: #fff;
      border: none; border-radius: 8px;
      font-size: 0.88rem; font-weight: 600;
      cursor: pointer; text-decoration: none;
      display: inline-block;
    }
    .btn-create:hover { background: #15803d; }

    /* POST GRID */
    .post-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.25rem;
    }

    /* POST CARD */
    .post-card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 1.25rem;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .post-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.1);
      border-color: #93c5fd;
    }

    .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 0.5rem; }
    .card-title-text { font-weight: 700; font-size: 1rem; line-height: 1.35; }

    .status-badge {
      display: inline-block;
      padding: 0.2rem 0.65rem;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 700;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .card-excerpt {
      font-size: 0.85rem;
      color: #64748b;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: auto;
    }
    .meta-chip {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.2rem 0.65rem;
      background: #f1f5f9;
      border-radius: 20px;
      font-size: 0.75rem;
      color: #475569;
      font-weight: 500;
    }

    .role-chip-engineer { background: #dbeafe; color: #1d4ed8; }
    .role-chip-doctor   { background: #dcfce7; color: #15803d; }

    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.78rem;
      color: #94a3b8;
      border-top: 1px solid #f1f5f9;
      padding-top: 0.6rem;
    }

    /* EMPTY STATE */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: #94a3b8;
    }
    .empty-state h3 { font-size: 1.1rem; margin-bottom: 0.5rem; color: #64748b; }

    @media (max-width: 600px) {
      .filter-bar { flex-direction: column; }
      .post-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="dashboard.html">HealthAI</a>
  <ul class="nav-links">
    <li><a href="post-feed.html" class="active">Browse Posts</a></li>
    <li><a href="create-post.html">Create Post</a></li>
    <li><a href="profile.html">Profile</a></li>
    <li><a href="login.html" id="logoutLink">Logout</a></li>
  </ul>
</nav>

<div class="page-wrapper">

  <!-- FILTER BAR -->
  <div class="filter-bar">
    <div class="filter-group">
      <label>Domain</label>
      <select id="filterDomain">
        <option value="">All Domains</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Role</label>
      <select id="filterRole">
        <option value="">All Roles</option>
        <option value="engineer">Engineer</option>
        <option value="doctor">Healthcare Professional</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Stage</label>
      <select id="filterStage">
        <option value="">All Stages</option>
        <option value="idea">Idea</option>
        <option value="concept_validation">Concept Validation</option>
        <option value="prototype">Prototype Developed</option>
        <option value="pilot_testing">Pilot Testing</option>
        <option value="pre_deployment">Pre-Deployment</option>
      </select>
    </div>
    <div class="filter-group">
      <label>City</label>
      <input type="text" id="filterCity" placeholder="e.g. Ankara">
    </div>
    <button class="btn-filter" onclick="applyFilters()">Apply</button>
    <button class="btn-reset" onclick="resetFilters()">Reset</button>
  </div>

  <!-- RESULTS HEADER -->
  <div class="results-header">
    <span class="results-count" id="resultsCount">Loading…</span>
    <a href="create-post.html" class="btn-create">+ New Post</a>
  </div>

  <!-- POST GRID -->
  <div class="post-grid" id="postGrid"></div>

</div>

<script src="mock-data.js"></script>
<script>
  // Populate domain filter
  const domainFilter = document.getElementById('filterDomain');
  DOMAINS.forEach(d => {
    const opt = document.createElement('option');
    opt.value = d.toLowerCase().replace(/\s+/g,'_');
    opt.textContent = d;
    domainFilter.appendChild(opt);
  });

  let currentPosts = [];

  function getStatusStyle(status) {
    const meta = STATUS_META[status] || { label: status, color: '#6b7280' };
    return { label: meta.label, color: meta.color };
  }

  function stageLabelMap(val) {
    const map = {
      idea: 'Idea', concept_validation: 'Concept Validation',
      prototype: 'Prototype', pilot_testing: 'Pilot Testing', pre_deployment: 'Pre-Deployment'
    };
    return map[val] || val;
  }

  function getAuthorName(userId) {
    const u = MOCK_USERS.find(u => u.id === userId);
    return u ? u.name : 'Unknown';
  }

  function renderPosts(posts) {
    const grid = document.getElementById('postGrid');
    const count = document.getElementById('resultsCount');

    // Only show non-draft posts in feed (drafts only visible to owner)
    const currentUser = getCurrentUser();
    const visible = posts.filter(p => {
      if (p.status === 'draft') return currentUser && p.user_id === currentUser.id;
      return true;
    });

    count.textContent = `${visible.length} post${visible.length !== 1 ? 's' : ''} found`;

    if (visible.length === 0) {
      grid.innerHTML = `
        <div class="empty-state" style="grid-column:1/-1">
          <div style="font-size:3rem;margin-bottom:1rem">🔍</div>
          <h3>No posts match your filters</h3>
          <p>Try adjusting the filters or <a href="create-post.html" style="color:#2563eb">create the first post</a> in this category.</p>
        </div>`;
      return;
    }

    grid.innerHTML = visible.map(p => {
      const { label, color } = getStatusStyle(p.status);
      const roleChip = p.role_type === 'engineer'
        ? '<span class="meta-chip role-chip-engineer">⚙ Engineer</span>'
        : '<span class="meta-chip role-chip-doctor">🏥 Healthcare</span>';

      return `
        <a class="post-card" href="post-detail.html?id=${p.id}">
          <div class="card-top">
            <div class="card-title-text">${p.title}</div>
            <span class="status-badge" style="background:${color}22;color:${color}">${label}</span>
          </div>
          <div class="card-excerpt">${p.explanation}</div>
          <div class="card-meta">
            ${roleChip}
            <span class="meta-chip">📍 ${p.city}, ${p.country}</span>
            <span class="meta-chip">🔬 ${p.domain}</span>
            <span class="meta-chip">📊 ${stageLabelMap(p.stage)}</span>
          </div>
          <div class="card-footer">
            <span>Posted by ${getAuthorName(p.user_id)}</span>
            <span>Expires ${p.expiry_date}</span>
          </div>
        </a>`;
    }).join('');
  }

  function applyFilters() {
    const domain = document.getElementById('filterDomain').value;
    const role   = document.getElementById('filterRole').value;
    const stage  = document.getElementById('filterStage').value;
    const city   = document.getElementById('filterCity').value.trim().toLowerCase();

    const filtered = MOCK_POSTS.filter(p => {
      if (domain && p.domain.toLowerCase().replace(/\s+/g,'_') !== domain) return false;
      if (role   && p.role_type !== role) return false;
      if (stage  && p.stage !== stage) return false;
      if (city   && !p.city.toLowerCase().includes(city)) return false;
      return true;
    });

    renderPosts(filtered);
  }

  function resetFilters() {
    document.getElementById('filterDomain').value = '';
    document.getElementById('filterRole').value   = '';
    document.getElementById('filterStage').value  = '';
    document.getElementById('filterCity').value   = '';
    renderPosts(MOCK_POSTS);
  }

  // Initial render (active posts first)
  const sorted = [...MOCK_POSTS].sort((a, b) => {
    const order = { active: 0, meeting_scheduled: 1, draft: 2, partner_found: 3, expired: 4 };
    return (order[a.status] ?? 9) - (order[b.status] ?? 9);
  });
  renderPosts(sorted);
</script>
</body>
</html>
