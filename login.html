<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login – HealthAI</title>

  <style>
    body {
      font-family: Arial;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: white;
      padding: 2rem;
      border-radius: 12px;
      width: 320px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      margin-bottom: 1rem;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .error {
      color: red;
      font-size: 14px;
      text-align: center;
    }

    .link {
      text-align: center;
      margin-top: 10px;
    }

    .link a {
      color: #2563eb;
      font-weight: bold;
      text-decoration: none;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>Login</h2>

  <form id="loginForm">
    <input type="email" id="email" placeholder="Email" required>
    <input type="password" id="password" placeholder="Password" required>

    <p class="error" id="error"></p>

    <button type="submit">Login</button>
  </form>

  <div class="link">
    <p>Don't have an account?</p>
    <a href="register.html">Register</a>
  </div>
</div>

<!-- 🔥 ÖNCE mock-data -->
<script src="mock-data.js"></script>

<!-- 🔥 SONRA login JS -->
<script src="login.js"></script>

</body>
</html>
